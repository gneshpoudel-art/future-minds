<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login – Future Minds</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4c1d95 100%);
        }

        .card {
            background: #fff;
            border-radius: 16px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 1.5rem;
            color: #1e1b4b;
            margin-bottom: 0.25rem;
        }

        p {
            color: #6b7280;
            font-size: 0.875rem;
            margin-bottom: 1.75rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.35rem;
        }

        input {
            width: 100%;
            padding: 0.65rem 0.9rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.95rem;
            margin-bottom: 1rem;
            outline: none;
            transition: border 0.2s;
        }

        input:focus {
            border-color: #7c3aed;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error {
            color: #dc2626;
            font-size: 0.83rem;
            margin-top: -0.5rem;
            margin-bottom: 0.75rem;
            display: none;
        }

        .logo {
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 2rem;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo"></div>
        <h1>Admin Login</h1>
        <p>Future Minds Educational Consultancy</p>
        <form id="loginForm">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" autocomplete="username" required />
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required />
            <div class="error" id="errorMsg"></div>
            <button type="submit" id="submitBtn">Sign In</button>
        </form>
    </div>

    <script>
        // If already logged in, go straight to dashboard
        if (localStorage.getItem('fm_admin_token')) {
            location.replace('dashboard.html');
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const err = document.getElementById('errorMsg');
            btn.disabled = true;
            btn.textContent = 'Signing in…';
            err.style.display = 'none';

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok && data.token) {
                    localStorage.setItem('fm_admin_token', data.token);
                    location.replace('dashboard.html');
                } else {
                    err.textContent = data.error || 'Login failed. Please try again.';
                    err.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Sign In';
                }
            } catch (ex) {
                err.textContent = 'Network error. Please try again.';
                err.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });
    </script>
</body>

</html>
